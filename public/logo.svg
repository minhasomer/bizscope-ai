<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Violet → Blue → Cyan gradient, lower-left to upper-right -->
    <linearGradient id="g" x1="4" y1="44" x2="44" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="45%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Soft glow for sparkle -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Magnifying glass scope ring
    Center (20,20), radius 13.5
    Gap at lower-right: 4 o'clock (30°) → 5 o'clock (60°) in SVG coords
    5 o'clock = (26.75, 31.69)  |  4 o'clock = (31.69, 26.75)
    Long arc clockwise (sweep=1, large-arc=1) = 330° arc
  -->
  <path d="M 26.75 31.69 A 13.5 13.5 0 1 1 31.69 26.75"
        fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Handle: from gap midpoint at 45° (29.5, 29.5) extending lower-right -->
  <line x1="29.5" y1="29.5" x2="40.5" y2="40.5"
        stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bar charts inside circle (ascending left to right, all bottom at y=27) -->
  <rect x="11" y="22" width="4" height="5"  rx="1" fill="url(#g)" opacity="0.80"/>
  <rect x="17" y="18" width="4" height="9"  rx="1" fill="url(#g)" opacity="0.90"/>
  <rect x="23" y="14" width="4" height="13" rx="1" fill="url(#g)"/>

  <!-- Trend line: lower-left through bars to upper-right, exits the ring -->
  <line x1="12" y1="25" x2="30" y2="7.5"
        fill="none" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Arrowhead V at tip (30, 7.5) pointing NE -->
  <polyline points="28.5,13 30,7.5 24.5,9"
            fill="none" stroke="url(#g)" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkle / starburst at (34, 6) — outside circle to upper-right -->
  <path d="M 34 3 L 35.5 4.5 L 37 6 L 35.5 7.5 L 34 9 L 32.5 7.5 L 31 6 L 32.5 4.5 Z"
        fill="url(#g)" filter="url(#glow)" opacity="0.92"/>

  <!-- Floating particle dots -->
  <circle cx="6"  cy="14" r="1.5" fill="#7c3aed" opacity="0.55"/>
  <circle cx="41" cy="16" r="1"   fill="#06b6d4" opacity="0.60"/>
  <circle cx="5"  cy="32" r="1"   fill="#3b82f6" opacity="0.45"/>
  <circle cx="43" cy="34" r="1"   fill="#06b6d4" opacity="0.50"/>
</svg>
